<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Idea Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1f1f1f;
    --accent1: #ff6b35;
    --accent2: #00e5ff;
    --accent3: #b4ff39;
    --accent4: #ff3d9a;
    --accent5: #9b5de5;
    --accent6: #ffd166;
    --text: #e8e8e8;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    padding: 80px 60px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: 'IDEAS';
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 200px;
    font-weight: 900;
    color: #ffffff04;
    pointer-events: none;
    white-space: nowrap;
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-tag::before {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--accent2);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 100px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -2px;
  }

  h1 span {
    font-style: italic;
    color: var(--accent1);
  }

  .header-meta {
    margin-top: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 40px;
  }

  /* Controls */
  .controls {
    padding: 24px 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: currentColor;
    color: var(--text);
  }

  .filter-btn.active { background: var(--surface); }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 16px 8px 36px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }

  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* Main grid */
  .main {
    padding: 60px;
  }

  .category-section {
    margin-bottom: 80px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .category-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .category-emoji {
    font-size: 24px;
  }

  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
  }

  .category-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    letter-spacing: 2px;
  }

  .ideas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2px;
  }

  .idea-card {
    background: var(--surface);
    padding: 24px 28px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    border: 1px solid transparent;
  }

  .idea-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: var(--card-accent, var(--accent1));
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.25s;
  }

  .idea-card:hover {
    background: #161616;
    border-color: var(--border);
    transform: translateY(-2px);
  }

  .idea-card:hover::before {
    transform: scaleY(1);
  }

  .idea-card.saved {
    border-color: var(--card-accent, var(--accent1));
  }

  .idea-card.saved::before {
    transform: scaleY(1);
  }

  .idea-text {
    font-size: 14px;
    line-height: 1.7;
    color: #ccc;
    font-weight: 300;
  }

  .idea-text strong {
    color: var(--text);
    font-weight: 600;
  }

  .idea-actions {
    margin-top: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .idea-card:hover .idea-actions {
    opacity: 1;
  }

  .idea-save-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .idea-save-btn:hover, .idea-card.saved .idea-save-btn {
    border-color: var(--card-accent, var(--accent1));
    color: var(--card-accent, var(--accent1));
  }

  /* Saved panel */
  .saved-panel {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    max-width: 320px;
    min-width: 240px;
    transform: translateY(120px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
  }

  .saved-panel.visible {
    transform: translateY(0);
    opacity: 1;
  }

  .saved-panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent3);
    margin-bottom: 12px;
  }

  .saved-count {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 900;
    line-height: 1;
    color: var(--accent3);
  }

  .saved-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .clear-saved {
    margin-top: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    border-radius: 2px;
  }

  .clear-saved:hover { color: var(--text); border-color: var(--muted); }

  .no-results {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 24px;
    display: none;
  }

  .hidden { display: none !important; }

  @media (max-width: 768px) {
    header, .main, .controls { padding-left: 24px; padding-right: 24px; }
    .ideas-grid { grid-template-columns: 1fr; }
    .search-wrap { margin-left: 0; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">The Idea Vault</div>
  <h1>Every<br><span>Idea.</span></h1>
  <div class="header-meta">
    <span id="total-count">— ideas</span>
    <span>Click to save · Search to filter</span>
  </div>
</header>

<div class="controls">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="vibe-coding">Vibe Coding</button>
  <button class="filter-btn" data-filter="intellectual">Get Smarter</button>
  <button class="filter-btn" data-filter="life">Life & World</button>
  <button class="filter-btn" data-filter="saved-only">★ Saved</button>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search ideas...">
  </div>
</div>

<div class="main" id="main">
  <!-- Dynamically rendered -->
</div>

<div class="no-results" id="no-results">Nothing found.</div>

<div class="saved-panel" id="saved-panel">
  <div class="saved-panel-title">Saved Ideas</div>
  <div class="saved-count" id="saved-count">0</div>
  <div class="saved-label">ideas saved</div>
  <button class="clear-saved" onclick="clearSaved()">Clear All</button>
</div>

<script>

      'A songwriting app that gives you exactly 4 chords, 8 lines, and 3 minutes — when the timer ends, your song is done and locked forever',

  {

    ideas: [

  },

  },
  {
    emoji: '💀',
    title: 'Dark & Existential',

    accent: '#666',
    ideas: [

      'A "legacy generator" — if you died today, what would your digital footprint say about you?',
      'An app that writes your eulogy based on your calendar and todos',
      'A "time capsule" app where your message gets rewritten in the style of how you\'ll probably talk in 20 years',

    ]
  },
  {
    emoji: '🔧',
    title: 'Developer Tools with Soul',
    tag: 'vibe-coding',
    accent: '#ffd166',
    ideas: [

      'A git blame that shows your emotional state when you wrote each commit (based on commit message tone)',

    ]
  },
  {
    emoji: '🧸',
    title: 'Pure Nostalgia',
    tag: 'life',
    accent: '#ff6b35',
    ideas: [
      'Recreate any website from your childhood using only your memory as the prompt',
      'A "childhood interest" tracker that maps what you loved at 8 and finds its adult equivalent',
      'An old-school point-and-click adventure game set in your actual hometown',
    ]

let savedIdeas = new Set();
let currentFilter = 'all';
let searchQuery = '';

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let totalShown = 0;

  categories.forEach((cat, ci) => {
    const filteredIdeas = cat.ideas.filter(idea => {
      const matchFilter =
        currentFilter === 'all' ||
        (currentFilter === 'saved-only' && savedIdeas.has(idea)) ||
        cat.tag === currentFilter;

      const matchSearch = !searchQuery || idea.toLowerCase().includes(searchQuery.toLowerCase()) || cat.title.toLowerCase().includes(searchQuery.toLowerCase());

      return matchFilter && matchSearch;
    });

    if (filteredIdeas.length === 0) return;
    totalShown += filteredIdeas.length;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.style.animationDelay = (ci * 0.05) + 's';

    section.innerHTML = `
      <div class="category-header">
        <span class="category-emoji">${cat.emoji}</span>
        <span class="category-title">${cat.title}</span>
        <span class="category-count">${filteredIdeas.length} ideas</span>
      </div>
      <div class="ideas-grid">
        ${filteredIdeas.map(idea => `
          <div class="idea-card ${savedIdeas.has(idea) ? 'saved' : ''}" 
               style="--card-accent: ${cat.accent}"
               onclick="toggleSave(this, '${idea.replace(/'/g, "\\'")}')">
            <div class="idea-text">${idea}</div>
            <div class="idea-actions">
              <button class="idea-save-btn">${savedIdeas.has(idea) ? '★ Saved' : '☆ Save'}</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    main.appendChild(section);
  });

  document.getElementById('total-count').textContent = totalShown + ' ideas';
  document.getElementById('no-results').style.display = totalShown === 0 ? 'block' : 'none';
  updateSavedPanel();
}

function toggleSave(card, idea) {
  if (savedIdeas.has(idea)) {
    savedIdeas.delete(idea);
  } else {
    savedIdeas.add(idea);
  }
  renderAll();
}

function updateSavedPanel() {
  const panel = document.getElementById('saved-panel');
  const count = document.getElementById('saved-count');
  count.textContent = savedIdeas.size;
  if (savedIdeas.size > 0) {
    panel.classList.add('visible');
  } else {
    panel.classList.remove('visible');
  }
}

function clearSaved() {
  savedIdeas.clear();
  renderAll();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderAll();
});

renderAll();
</script>
</body>
</html>
