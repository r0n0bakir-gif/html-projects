<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine? 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fde8f0;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .heart-float {
    position: absolute;
    font-size: 1.2rem;
    animation: floatUp linear infinite;
    opacity: 0.5;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    background: white;
    border-radius: 32px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(220, 80, 120, 0.18);
    max-width: 420px;
    width: 92vw;
    border: 2px solid #f9bdd5;
  }

  /* Bear emoji with bounce */
  .bear {
    font-size: 7rem;
    display: block;
    margin-bottom: 12px;
    animation: bearBounce 1.8s ease-in-out infinite;
    line-height: 1;
  }

  @keyframes bearBounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%       { transform: translateY(-12px) rotate(3deg); }
  }

  /* Step containers */
  .step { display: none; }
  .step.active { display: block; }

  h1 {
    font-size: 1.65rem;
    font-weight: 900;
    color: #d63068;
    margin-bottom: 28px;
    line-height: 1.3;
    letter-spacing: -0.3px;
  }

  .subtext {
    font-size: 1rem;
    color: #e08aaa;
    margin-bottom: 24px;
    font-weight: 600;
  }

  /* Buttons */
  .btns {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff6fa3, #e0365e);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(224, 54, 94, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
  }

  .btn-yes:hover {
    transform: scale(1.07) translateY(-2px);
    box-shadow: 0 10px 28px rgba(224, 54, 94, 0.5);
  }

  .btn-no {
    background: #f2f2f2;
    color: #999;
    border: 2px dashed #ddd;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: transform 0.1s;
    position: absolute; /* escape positioning */
    white-space: nowrap;
    user-select: none;
  }

  /* Yes celebration */
  .celebration {
    font-size: 3rem;
    animation: popIn 0.5s ease-out forwards;
    margin-bottom: 10px;
  }

  @keyframes popIn {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); }
  }

  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Progress dots */
  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f9bdd5;
    transition: background 0.3s, transform 0.3s;
  }

  .dot.active { background: #d63068; transform: scale(1.3); }

  /* No button shrink trick — yes counter makes Yes grow */
  .btn-yes { transition: padding 0.3s, font-size 0.3s, transform 0.15s; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<!-- Step 1 -->
<div class="card">
  <div class="step active" id="step1">
    <span class="bear">🐻</span>
    <h1>Would You Be My Valentine? 💝</h1>
    <div class="btns" id="btns1">
      <button class="btn-yes" onclick="goStep2()">Yes 🥰</button>
      <button class="btn-no" id="noBtn1" onmouseover="runAway(this)" ontouchstart="runAway(this)">No</button>
    </div>
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="step" id="step2">
    <span class="bear" style="font-size:6rem">🐻‍❄️</span>
    <h1>Are you sure you want to be my valentine? 💕</h1>
    <div class="btns" id="btns2">
      <button class="btn-yes" onclick="goStep3()" id="yesBig">Yes, 100% Sure! 🎀</button>
      <button class="btn-no" id="noBtn2" onmouseover="runAway(this)" ontouchstart="runAway(this)">Let me think…</button>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Step 3: Celebration -->
  <div class="step" id="step3">
    <div class="celebration">🎉</div>
    <span class="bear" style="font-size:5.5rem; animation-name: bearSpin">🐻</span>
    <h1 style="color:#d63068; margin-top:8px">Yayyyy!! 🩷<br>You made the bear SO happy!</h1>
    <p class="subtext">I knew you'd say yes 🥺💖</p>
    <div style="font-size:2.5rem; letter-spacing:6px; animation: popIn 0.6s ease-out forwards;">
      💝💖🌸🍓💌
    </div>
    <div class="dots" style="margin-top:24px">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>
  // Spawn floating hearts background
  const bg = document.getElementById('heartsBg');
  const heartEmojis = ['💖','💕','🩷','❤️','💗','💓','💝'];
  for (let i = 0; i < 22; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (6 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    bg.appendChild(h);
  }

  // Run away logic
  let noClickCount = 0;

  function runAway(btn) {
    noClickCount++;
    const card = btn.closest('.card');
    const cardRect = card.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    // Shrink the No button each time
    const currentSize = parseFloat(getComputedStyle(btn).fontSize);
    if (currentSize > 9) {
      btn.style.fontSize = (currentSize - 1.5) + 'px';
      btn.style.padding = '10px ' + Math.max(10, 36 - noClickCount * 4) + 'px';
    }

    // Random position within card bounds, away from edges
    const margin = 10;
    const maxX = cardRect.width - btnRect.width - margin * 2;
    const maxY = cardRect.height - btnRect.height - margin * 2;

    const newX = margin + Math.random() * maxX;
    const newY = margin + Math.random() * maxY;

    btn.style.left = newX + 'px';
    btn.style.top = newY + 'px';

    // Grow Yes button slightly
    const yesBtn = btn.closest('.btns').querySelector('.btn-yes');
    if (yesBtn) {
      const ySize = parseFloat(getComputedStyle(yesBtn).fontSize);
      if (ySize < 1.5 * 16) {
        yesBtn.style.fontSize = (ySize + 0.5) + 'px';
      }
    }

    // Make card relative so absolute positioning of no button works
    card.style.position = 'relative';
  }

  // Position no buttons initially (relative to card)
  function initNoBtns() {
    document.querySelectorAll('.btn-no').forEach(btn => {
      // Start at a natural inline position relative to btns div
      // We'll move to absolute when first hovered
    });
  }
  initNoBtns();

  function goStep2() {
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    noClickCount = 0;
    // Reset No button
    const nb = document.getElementById('noBtn2');
    nb.style.left = '';
    nb.style.top = '';
    nb.style.position = 'absolute';
    nb.style.fontSize = '';
    nb.style.padding = '';
  }

  function goStep3() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    launchConfetti();
  }

  // Initial absolute positioning for no buttons
  window.addEventListener('load', () => {
    ['noBtn1', 'noBtn2'].forEach(id => {
      const btn = document.getElementById(id);
      if (btn) {
        btn.style.position = 'absolute';
        btn.style.left = '230px';
        btn.style.top = '0px';
      }
    });
  });

  // Confetti
  function launchConfetti() {
    const wrap = document.getElementById('confettiWrap');
    const colors = ['#ff6fa3','#ffb3d1','#ffd700','#ff4f81','#c9f0ff','#b5f5c7'];
    for (let i = 0; i < 90; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 10) + 'px';
      c.style.height = (6 + Math.random() * 10) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      c.style.animationDelay = (Math.random() * 0.8) + 's';
      wrap.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
</script>
</body>
</html>
