<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine? 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffd6e7 0%, #ffb3d1 50%, #fce4f0 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .heart-float {
    position: fixed;
    pointer-events: none;
    animation: floatUp linear infinite;
    opacity: 1;
    z-index: 5;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(1) rotate(0deg); opacity: 1; }
    75%  { opacity: 1; }
    92%  { opacity: 0.4; }
    100% { transform: translateY(15vh) scale(0.8) rotate(20deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 50;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(14px);
    border-radius: 36px;
    padding: 38px 36px 34px;
    text-align: center;
    box-shadow: 0 24px 70px rgba(210,60,110,0.18), 0 2px 0 #f9bdd5 inset;
    max-width: 420px;
    width: 92vw;
    border: 2px solid rgba(255,255,255,0.85);
  }

  .cat-img {
    width: 210px;
    height: 210px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #ffb3d1;
    box-shadow: 0 8px 30px rgba(210,60,110,0.22);
    margin-bottom: 18px;
    animation: catBob 2.2s ease-in-out infinite;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  @keyframes catBob {
    0%,100% { transform: translateY(0) rotate(-1.5deg); }
    50%      { transform: translateY(-10px) rotate(1.5deg); }
  }

  .step { display: none; }
  .step.active { display: block; }

  h1 {
    font-size: 1.6rem;
    font-weight: 900;
    color: #c4325e;
    margin-bottom: 26px;
    line-height: 1.35;
  }

  .btns-wrap {
    display: flex;
    justify-content: center;
    height: 56px;
    align-items: center;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff7eb3, #e0365e);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 38px;
    font-size: 1.1rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 22px rgba(224,54,94,0.38);
    transition: transform 0.2s, box-shadow 0.2s, font-size 0.35s, padding 0.35s;
    z-index: 2;
  }
  .btn-yes:hover {
    transform: scale(1.09) translateY(-2px);
    box-shadow: 0 10px 28px rgba(224,54,94,0.5);
  }

  /* No button roams freely across the whole viewport */
  .btn-no {
    position: fixed;
    background: #f2f2f2;
    color: #aaa;
    border: 2px dashed #ddd;
    border-radius: 50px;
    padding: 14px 32px;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    z-index: 999;
    /* smooth springy transition */
    transition:
      left  0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
      top   0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
      font-size 0.4s ease,
      padding   0.4s ease,
      opacity   0.35s ease;
  }

  .celebration { font-size: 3rem; animation: popIn 0.5s ease-out; margin-bottom: 6px; }
  @keyframes popIn {
    0%  { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); opacity: 1; }
    100%{ transform: scale(1); }
  }

  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
  .confetti-piece {
    position: absolute;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .dots { display: flex; justify-content: center; gap: 8px; margin-top: 26px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f9bdd5; transition: background 0.3s, transform 0.3s; }
  .dot.active { background: #d63068; transform: scale(1.3); }
  .subtext { color: #e08aaa; font-weight: 600; font-size: 1rem; margin-bottom: 16px; }
  .love-icons { font-size: 2rem; letter-spacing: 6px; animation: popIn 0.6s ease-out; }
</style>
</head>

    <h1 style="margin-top:6px">I knew you would say yes 🩷</h1>
    <p class="subtext">I love you for it &lt;3 🥺💖</p>
    <div class="love-icons">💝💖🌸🍓💌</div>
    <div class="dots" style="margin-top:24px">
      <div class="dot"></div><div class="dot"></div><div class="dot active"></div>
    </div>

</div>

<!-- Roaming No button -->
<button class="btn-no" id="noBtn"
  onmouseover="escapeAway(event)"
  onmousemove="escapeAway(event)"
  ontouchstart="escapeAway(event)">No 🙈</button>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>
  // Embed the cat image as data URL so it works in the HTML file directly
  // We'll use a pink cat placeholder SVG as fallback
  (function embedImage() {
    const imgs = document.querySelectorAll('.cat-img');
    // Try to load; if it fails, use a cute SVG placeholder
    imgs.forEach(img => {
      img.onerror = function() {
        this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='100' fill='%23ffd6e7'/%3E%3Ctext x='100' y='120' text-anchor='middle' font-size='80'%3E🐱%3C/text%3E%3C/svg%3E";
      };
    });
  })();

  // ── Floating hearts ──────────────────────────────────────
  const heartEmojis = ['💖','💕','🩷','❤️','💗','💓','💝','🌸'];
  const bg = document.getElementById('heartsBg');
  for (let i = 0; i < 45; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    // Spread across full width including edges (0–15% and 85–100% = beside card)
    let leftPos;
    if (i % 3 === 0) leftPos = Math.random() * 15;           // left side
    else if (i % 3 === 1) leftPos = 85 + Math.random() * 15; // right side
    else leftPos = Math.random() * 100;                        // anywhere
    Object.assign(h.style, {
      left: leftPos + 'vw',
      fontSize: (1.6 + Math.random()*2.0) + 'rem',
      animationDuration: (7 + Math.random()*8) + 's',
      animationDelay: (Math.random()*8) + 's',
    });
    bg.appendChild(h);
  }

  // ── No button logic ──────────────────────────────────────
  const noBtn = document.getElementById('noBtn');
  let escapeCount = 0;
  let currentStep = 1;
  let lastEscapeTime = 0;

  function placeNoBtn() {
    const yesId = 'yesBtn' + currentStep;
    const yesBtn = document.getElementById(yesId);
    if (!yesBtn) return;
    const r = yesBtn.getBoundingClientRect();
    // Disable transition for instant placement
    noBtn.style.transition = 'none';
    noBtn.style.left = (r.right + 20) + 'px';
    noBtn.style.top  = (r.top) + 'px';
    noBtn.style.opacity = '1';
    noBtn.style.pointerEvents = 'auto';
    // Re-enable smooth transition after a frame
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        noBtn.style.transition = '';
      });
    });
  }

  function escapeAway(e) {
    const now = Date.now();
    if (now - lastEscapeTime < 80) return; // throttle
    lastEscapeTime = now;
    escapeCount++;

    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const margin = 16;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const cx = e.clientX ?? vw / 2;
    const cy = e.clientY ?? vh / 2;

    // Find a spot that's away from the cursor
    let nx, ny, tries = 0;
    do {
      nx = margin + Math.random() * (vw - btnW - margin * 2);
      ny = margin + Math.random() * (vh - btnH - margin * 2);
      tries++;
    } while (
      Math.hypot(nx - cx, ny - cy) < 180 && tries < 25
    );

    noBtn.style.left = nx + 'px';
    noBtn.style.top  = ny + 'px';

    // Shrink No button after repeated hover attempts
    if (escapeCount > 3) {
      const shrinks = escapeCount - 3;
      const fs = Math.max(0.5, 1.05 - shrinks * 0.055);
      const padV = Math.max(5, 14 - shrinks * 2);
      const padH = Math.max(10, 32 - shrinks * 3);
      noBtn.style.fontSize = fs + 'rem';
      noBtn.style.padding = `${padV}px ${padH}px`;
      noBtn.style.opacity = Math.max(0.3, 1 - shrinks * 0.07) + '';
    }

    // Grow Yes button
    const yesBtn = document.getElementById('yesBtn' + currentStep);
    if (yesBtn) {
      const scale = Math.min(1.45, 1 + escapeCount * 0.022);
      yesBtn.style.transform = `scale(${scale})`;
      yesBtn.style.boxShadow = `0 ${6 + escapeCount}px ${22 + escapeCount*2}px rgba(224,54,94,0.45)`;
    }
  }

  function goStep2() {
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    currentStep = 2;
    escapeCount = 0;
    noBtn.style.fontSize = '';
    noBtn.style.padding = '';
    noBtn.style.opacity = '1';
    noBtn.textContent = 'Let me think… 🤔';
    setTimeout(placeNoBtn, 80);
  }

  function goStep3() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    noBtn.style.opacity = '0';
    noBtn.style.pointerEvents = 'none';
    launchConfetti();
  }

  function launchConfetti() {
    const wrap = document.getElementById('confettiWrap');
    const colors = ['#ff6fa3','#ffb3d1','#ffd700','#ff4f81','#c9f0ff','#b5f5c7','#fff'];
    for (let i = 0; i < 110; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      Object.assign(c.style, {
        left: Math.random()*100 + 'vw',
        background: colors[Math.floor(Math.random()*colors.length)],
        width: (6 + Math.random()*10) + 'px',
        height: (6 + Math.random()*10) + 'px',
        borderRadius: Math.random() > 0.5 ? '50%' : '2px',
        animationDuration: (1.5 + Math.random()*2.5) + 's',
        animationDelay: (Math.random()*0.8) + 's',
      });
      wrap.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }
  }

  // Mobile: escape when finger comes close
  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const r = noBtn.getBoundingClientRect();
    if (Math.hypot(t.clientX - (r.left + r.width/2), t.clientY - (r.top + r.height/2)) < 130) {
      escapeAway(t);
    }
  }, { passive: true });

  window.addEventListener('load', () => setTimeout(placeNoBtn, 120));
  window.addEventListener('resize', placeNoBtn);
</script>
</body>
</html>
